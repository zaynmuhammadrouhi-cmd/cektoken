<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect...</title>
</head>

<body>

<h2 id="status">Mengecek...</h2>

<script>

let id = location.hash.replace("#/","");

if(id){

    document.getElementById("status").innerHTML =
    "Mengalihkan ke Yagami...";

    location.replace(
        "https://yagami-cell.com/test_game_inject/test_pln/"+id
    );

}else{

    document.getElementById("status").innerHTML =
    "ID PLN tidak ditemukan.";

}

</script>

</body>
</html>
